version: "3.5"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "7443:7443"
    networks:
      - nginx-proxy-network
    env_file:
      - ./nginx/.env
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      # nginx image executes /docker-entrypoint.d/*.sh before launching nginx
      - ./nginx/domains/domains.map:/etc/nginx/domains.map:ro
      - ./nginx/domains/db-domains.map:/etc/nginx/db-domains.map:ro
      - ./nginx/domains/generate-maps.sh:/docker-entrypoint.d/10-generate-maps.sh:ro
    restart: always

networks:
  nginx-proxy-network:
    driver: bridge
    name: 'nginx-proxy-network'
