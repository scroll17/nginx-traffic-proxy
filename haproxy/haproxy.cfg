# =============================================================================
# Thin, STABLE L4 load balancer in front of two interchangeable nginx backends
# (nginx_blue / nginx_green). This file almost never changes, so HAProxy almost
# never needs a restart — while the nginx backends (domains, config, image) can be
# rolled one at a time with ZERO downtime behind it.
#
#   client ─▶ haproxy(:80/:443/:7443) ─send-proxy-v2─▶ nginx_blue|green ─▶ swag/gateways
#
# mode tcp everywhere: TLS is NOT terminated here (SNI passthrough stays intact).
# Real client IP is carried to the backends via PROXY protocol v2 (send-proxy-v2),
# which each backend reads (listen ... proxy_protocol) and re-emits to swag.
# =============================================================================

global
    log stdout format raw local0 info
    maxconn 100000

defaults
    mode tcp
    log global
    option dontlognull
    timeout connect 5s
    timeout client  1h          # long-lived: WebSocket / DB sessions
    timeout server  1h
    retries 3
    option redispatch           # if a backend refuses (e.g. during its roll), try the other

# Docker embedded DNS so backend container names re-resolve when recreated.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 10s
    hold other 10s
    hold refused 10s
    hold nx 10s
    hold timeout 10s

# Liveness endpoint for the container healthcheck (HTTP 200 while HAProxy is up).
frontend health
    mode http
    bind *:8404
    monitor-uri /healthz

# --- Frontends (host-published ports) ---------------------------------------
frontend ft_http
    bind *:80
    default_backend bk_http

frontend ft_https
    bind *:443
    default_backend bk_https

frontend ft_db
    bind *:7443
    default_backend bk_db

# --- Backends ---------------------------------------------------------------
# Health check is a plain HTTP GET /healthz on port 81 of each nginx (no PROXY
# header on the check), while DATA goes to 80/443/7443 WITH send-proxy-v2.
backend bk_http
    option httpchk GET /healthz
    http-check expect status 200
    default-server check port 81 inter 2s fall 2 rise 1 send-proxy-v2 resolvers docker init-addr none
    server blue  nginx_blue:80
    server green nginx_green:80

backend bk_https
    option httpchk GET /healthz
    http-check expect status 200
    default-server check port 81 inter 2s fall 2 rise 1 send-proxy-v2 resolvers docker init-addr none
    server blue  nginx_blue:443
    server green nginx_green:443

backend bk_db
    option httpchk GET /healthz
    http-check expect status 200
    default-server check port 81 inter 2s fall 2 rise 1 send-proxy-v2 resolvers docker init-addr none
    server blue  nginx_blue:7443
    server green nginx_green:7443
