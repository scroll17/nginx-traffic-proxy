worker_processes auto;

# Raise the per-worker file-descriptor ceiling so worker_connections can actually be
# reached — every connection (and each upstream socket / log fd) consumes an fd, and a
# passthrough session uses two (client side + backend side).
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
}

# TCP Stream module
stream {
    # Log format for TCP
    log_format stream_log '$remote_addr:$remote_port -> $server_addr:$server_port '
                          'SNI="$ssl_preread_server_name" backend="$backend_name" '
                          'bytes_in=$bytes_received bytes_out=$bytes_sent';

    access_log /var/log/nginx/stream_access.log stream_log;

    # L4 connection limiting per client IP (TCP connection-exhaustion guard).
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # 1. SNI Map -> upstream name.
    # Generated from nginx/domains/domains.map by generate-maps.sh (single source of
    # truth, shared with the :80 http map). Edit domains.map, not this block.
    include /etc/nginx/generated/stream_backend.map;

    # 2. Black hole for unknown domains
    upstream reject_sni {
        # Port discard (9) / any unused
        # No service is listening -> connect() => RST/timeout
        server 127.0.0.1:9;
    }

    # 1b. DB SNI map -> per-app TLS gateway (ghostunnel) for closed-port DB access.
    # Clients reach a DB via subdomain over TLS (e.g. pg.synergate.space:7443),
    # we route by SNI to the app's gateway sidecar, which terminates TLS (mTLS)
    # and forwards plaintext to the real DB on the internal network. This lets us
    # STOP publishing raw DB ports (5432/27017/...) to the host.
    # Generated from nginx/domains/db-domains.map by generate-maps.sh — edit that file.
    include /etc/nginx/generated/stream_db_backend.map;

    server {
        listen 443;
        proxy_pass $backend_name;
        ssl_preread on;

        # Cap concurrent TCP sessions per source IP (drops excess connections).
        limit_conn conn_per_ip 50;

        # Prepend a PROXY protocol v1 header to the upstream connection so the
        # backend (swag) can recover the real client IP through TLS passthrough.
        # The backend MUST listen with `proxy_protocol`, otherwise the handshake breaks.
        proxy_protocol on;

        # Docker DNS
        resolver 127.0.0.11 valid=30s; # for Docker; 127.0.0.11 - predefined Docker DNS

        # Connect to the backend fast, but keep idle sessions alive long enough for
        # WebSocket / socket.io passthrough: proxy_timeout is the max idle gap between
        # reads/writes on the session, so a low value (30s) would drop long-lived WS.
        proxy_connect_timeout 3s;
        proxy_timeout 1h;
    }

    # --- DB access port: SNI-routed TLS passthrough to per-app gateways ---
    # Separate from :443 ON PURPOSE: NO proxy_protocol here (ghostunnel/DB gateways
    # don't speak the PROXY header). One shared port for every app's DBs; the actual
    # service is selected by the TLS SNI (subdomain) via $db_backend above.
    server {
        listen 7443;
        proxy_pass $db_backend;
        ssl_preread on;

        # Reuse the same per-IP connection guard as the web passthrough.
        limit_conn conn_per_ip 50;

        resolver 127.0.0.11 valid=30s; # Docker DNS, so gateways can be recreated

        # DB sessions are long-lived; keep them open like the web stream.
        proxy_connect_timeout 3s;
        proxy_timeout 1h;
    }
}

http {
    # Hide the nginx version in the Server header and default error pages.
    server_tokens off;

    # Docker DNS: lets proxy_pass with a variable re-resolve backend IPs at runtime,
    # so the front survives swag (and other backends) being recreated with a new IP.
    resolver 127.0.0.11 valid=30s;

    # --- Anti-slowloris: cut clients that send headers/body or read responses slowly ---
    client_header_timeout 5s;
    client_body_timeout   10s;
    send_timeout          10s;
    keepalive_timeout     30s;

    # Bound header/body buffers so a client can't hold workers with oversized headers.
    client_max_body_size      10m;
    large_client_header_buffers 4 16k;

    # --- L7 rate / connection limiting per client IP (request-flood guard) ---
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=http_conn_per_ip:10m;

    limit_req         zone=req_per_ip burst=40 nodelay;
    limit_conn        http_conn_per_ip 20;
    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
