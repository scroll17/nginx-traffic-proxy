worker_processes auto;

events {
    worker_connections 1024;
}

# TCP Stream module
stream {
    # Log format for TCP
    log_format stream_log '$remote_addr:$remote_port -> $server_addr:$server_port '
                          'SNI="$ssl_preread_server_name" backend="$backend_name" '
                          'bytes_in=$bytes_received bytes_out=$bytes_sent';

    access_log /var/log/nginx/stream_access.log stream_log;

    # L4 connection limiting per client IP (TCP connection-exhaustion guard).
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # 1. SNI Map -> upstream name
    map $ssl_preread_server_name $backend_name {
        # IMPORTANT: Empty SNI first (requests to IP without SNI)
        ""                         reject_sni;

        ${DOMAIN_1} ${CONTAINER_NAME_1}:443;
        www.${DOMAIN_1} ${CONTAINER_NAME_1}:443;

        ${DOMAIN_2} ${CONTAINER_NAME_2}:443;
        www.${DOMAIN_2} ${CONTAINER_NAME_2}:443;

        # IMPORTANT: everything that is not above is in reject
        default                   reject_sni;
    }

    # 2. Black hole for unknown domains
    upstream reject_sni {
        # Port discard (9) / any unused
        # No service is listening -> connect() => RST/timeout
        server 127.0.0.1:9;
    }

    server {
        listen 443;
        proxy_pass $backend_name;
        ssl_preread on;

        # Cap concurrent TCP sessions per source IP (drops excess connections).
        limit_conn conn_per_ip 50;

        # Prepend a PROXY protocol v1 header to the upstream connection so the
        # backend (swag) can recover the real client IP through TLS passthrough.
        # The backend MUST listen with `proxy_protocol`, otherwise the handshake breaks.
        proxy_protocol on;

        # Docker DNS
        resolver 127.0.0.11 valid=30s; # for Docker; 127.0.0.11 - predefined Docker DNS

        # (optional) stricter timeouts to avoid connection hangs
        proxy_connect_timeout 3s;
        proxy_timeout 30s;
    }
}

http {
    # Docker DNS: lets proxy_pass with a variable re-resolve backend IPs at runtime,
    # so the front survives swag (and other backends) being recreated with a new IP.
    resolver 127.0.0.11 valid=30s;

    # --- Anti-slowloris: cut clients that send headers/body or read responses slowly ---
    client_header_timeout 5s;
    client_body_timeout   10s;
    send_timeout          10s;
    keepalive_timeout     30s;

    # Bound header/body buffers so a client can't hold workers with oversized headers.
    client_max_body_size      10m;
    large_client_header_buffers 4 16k;

    # --- L7 rate / connection limiting per client IP (request-flood guard) ---
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=http_conn_per_ip:10m;

    limit_req         zone=req_per_ip burst=40 nodelay;
    limit_conn        http_conn_per_ip 20;
    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
