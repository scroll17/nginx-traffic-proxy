# 0. CATCH-ALL: We block everything that is not explicitly listed.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # We break the connection hard, without a response body.
    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name ${DOMAIN_1} www.${DOMAIN_1};

    location /socket.io/ {
        proxy_pass    http://${CONTAINER_NAME_1}:80;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-NginX-Proxy false;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass  http://${CONTAINER_NAME_1}:80;


        # if ($server_port = 80) {
        #     proxy_pass    $scheme://${CONTAINER_NAME_1}:81;
        # }
        # if ($server_port = 443) {
        #     proxy_pass    $scheme://${CONTAINER_NAME_1}:444;
        # }

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }
}

