# =============================================================================
# Domain -> swag upstream table.
# THE ONLY PLACE to touch when adding/removing a domain on port 80.
# (mirror it in nginx.conf's $backend_name SNI map for 443.)
# =============================================================================
map $host $proxy_upstream {
    ${DOMAIN_1}          ${CONTAINER_NAME_1};
    www.${DOMAIN_1}      ${CONTAINER_NAME_1};

    ${DOMAIN_2}          ${CONTAINER_NAME_2};
    www.${DOMAIN_2}      ${CONTAINER_NAME_2};
    admin.${DOMAIN_2}    ${CONTAINER_NAME_2};

    # Unknown host -> empty -> dropped with 444 below.
    default                 "";
}

# WebSocket/socket.io upgrade helper: pass "upgrade" only when the client asked
# for it, otherwise "close". This makes the single location below handle plain
# HTTP, WebSocket and socket.io for every domain — no per-app /socket.io/ block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# =============================================================================
# ONE server for all domains. The upstream is chosen from $proxy_upstream.
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # CATCH-ALL: unknown / unmapped host -> break the connection hard.
    if ($proxy_upstream = "") {
        return 444;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass  http://$proxy_upstream:80;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }
}
