# =============================================================================
# Domain -> swag upstream map: map $host $proxy_upstream { ... default ""; }
# Generated from nginx/domains/domains.map by generate-maps.sh (single source of
# truth, shared with the :443 stream map). Edit domains.map, not this file.
# =============================================================================
include /etc/nginx/generated/http_upstream.map;

# =============================================================================
# Port 80 = ACME challenge + redirect ONLY. Apps are served exclusively over TLS
# (the :443 stream passthrough in nginx.conf). Plain HTTP never reaches the app.
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # CATCH-ALL: unknown / unmapped host -> break the connection hard.
    if ($proxy_upstream = "") {
        return 444;
    }

    # ACME HTTP-01: must reach the app's swag (certbot --standalone on :80) so
    # certificates can be issued/renewed. This is the ONLY path proxied on :80.
    location /.well-known/acme-challenge/ {
        proxy_pass         http://$proxy_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
    }

    # Everything else -> force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}
