# 0. CATCH-ALL: We block everything that is not explicitly listed.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # We break the connection hard, without a response body.
    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name ${DOMAIN_1} www.${DOMAIN_1};

    # Variable proxy_pass => re-resolved via the http{} resolver (Docker DNS),
    # so a recreated backend container is picked up without an nginx reload.
    set $upstream_1 ${CONTAINER_NAME_1};

    # Plain HTTP on :80 carries the Let's Encrypt HTTP-01 challenge
    # (/.well-known/acme-challenge/) and swag's own HTTP->HTTPS redirect
    # straight through to swag — no host port publishing needed.

    location /socket.io/ {
        proxy_pass    http://$upstream_1:80;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-NginX-Proxy false;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass  http://$upstream_1:80;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name ${DOMAIN_2};

    set $upstream_2 ${CONTAINER_NAME_2};

    location / {
        proxy_pass    http://$upstream_2:80;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }
}
