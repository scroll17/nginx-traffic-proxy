version: "3.5"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: synergate_swag
    logging: *default-logging
    networks:
      - synergate-network
      - nginx-proxy-network
    env_file:
      - ./swag/.env
    environment:
      URL: ${SWAG_DOMAIN}
      VALIDATION: http
      ONLY_SUBDOMAINS: 'false'
    volumes:
      - ./swag/instance:/config:r
#      - ./swag/nginx/default.conf:/config/nginx/site-confs/default.conf # uncomment after init swag
    restart: unless-stopped

  client:
    container_name: synergate_client_prod
    logging: *default-logging
    build:
      context: ./client
      dockerfile: Dockerfile-prod
    networks:
      - synergate-network
    environment:
      PORT: 80
      NODE_ENV: production
    depends_on:
      - api
    tty: true
    restart: "always"

  api:
    container_name: synergate_api_prod
    logging: *default-logging
    build:
      context: ./server
      dockerfile: Dockerfile-prod
    environment:
      HTTP_PORT: 4040
      APP_GETAWAY_PORT: 4041
      NODE_ENV: production
      MEDIA_DIR: /home/app/data/media
      BROADCAST_MEDIA_DIR: /home/app/data/broadcast-media
    env_file:
      - ./server/.env
    networks:
      - synergate-network
    volumes:
      - ./data:/home/app/data
    tty: true
    restart: "always"

  # ----------------------------------------------------------------------------
  # Databases: NOT published to the host anymore.
  # Before (insecure) we used to expose the port directly, e.g.:
  #   ports:
  #     - "5833:5432"   # <-- REMOVE: reachable from the whole internet
  # Now access goes only through the TLS+mTLS gateways below, via the front proxy.
  # ----------------------------------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: synergate_database_prod
    logging: *default-logging
    env_file:
      - ./server/.env
    networks:
      - synergate-network            # internal only — no nginx-proxy-network, no ports
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always

  mongo:
    image: mongo:7.0
    container_name: synergate_mongo_db_prod
    logging: *default-logging
    env_file:
      - ./server/.env               # expects MONGO_INITDB_ROOT_USERNAME / _PASSWORD
    networks:
      - synergate-network            # internal only — no published port
    volumes:
      - ./data/mongo:/data/db
    restart: always

  redis:
    image: redis:7.0.10-alpine
    container_name: synergate_redis_prod
    logging: *default-logging
    networks:
      - synergate-network            # internal only — no published port
    volumes:
      - ./data/redis:/data
    restart: always

  # --- TLS gateway for Postgres ---------------------------------------------
  # The front proxy routes SNI `pg.synergate.space` here. ghostunnel terminates
  # TLS, REQUIRES a client cert (mTLS, --allow-cn), then forwards plaintext to
  # postgres:5432 over the internal docker network.
  pg_gateway:
    image: ghostunnel/ghostunnel:latest
    container_name: synergate_pg_gateway
    logging: *default-logging
    command:
      - server
      - --listen=0.0.0.0:8443
      - --target=database:5432
      - --cert=/certs/server-cert.pem
      - --key=/certs/server-key.pem
      - --cacert=/certs/ca.pem
      - --allow-cn=db-client
    volumes:
      - ./db-gateway/certs:/certs:ro
    networks:
      - synergate-network            # to reach `database`
      - nginx-proxy-network          # so the front proxy can reach this gateway
    depends_on:
      - database
    restart: unless-stopped

  # --- TLS gateway for MongoDB ----------------------------------------------
  mongo_gateway:
    image: ghostunnel/ghostunnel:latest
    container_name: synergate_mongo_gateway
    logging: *default-logging
    command:
      - server
      - --listen=0.0.0.0:8443
      - --target=mongo:27017
      - --cert=/certs/server-cert.pem
      - --key=/certs/server-key.pem
      - --cacert=/certs/ca.pem
      - --allow-cn=db-client
    volumes:
      - ./db-gateway/certs:/certs:ro
    networks:
      - synergate-network            # to reach `mongo`
      - nginx-proxy-network          # so the front proxy can reach this gateway
    depends_on:
      - mongo
    restart: unless-stopped

  # --- TLS gateway for Redis ------------------------------------------------
  redis_gateway:
    image: ghostunnel/ghostunnel:latest
    container_name: synergate_redis_gateway
    logging: *default-logging
    command:
      - server
      - --listen=0.0.0.0:8443
      - --target=redis:6379
      - --cert=/certs/server-cert.pem
      - --key=/certs/server-key.pem
      - --cacert=/certs/ca.pem
      - --allow-cn=db-client
    volumes:
      - ./db-gateway/certs:/certs:ro
    networks:
      - synergate-network            # to reach `redis`
      - nginx-proxy-network          # so the front proxy can reach this gateway
    depends_on:
      - redis
    restart: unless-stopped

networks:
  synergate-network:
    driver: bridge
  nginx-proxy-network:
    external: true
    name: 'nginx-proxy-network'
