# =============================================================================
# Per-app SWAG site config. TLS terminates HERE (the front proxy only passes the
# encrypted :443 stream through by SNI), so L7 protections that CANNOT live on the
# front's L4 passthrough belong in this file.
#
# Mount after first swag init (uncomment the volume in docker-compose.prod.yaml).
# =============================================================================

# --- L7 rate / connection limiting per client IP (request-flood guard) -------
# Lives here because the front proxies :443 at L4 and cannot rate-limit requests.
# Per-app, per-IP. Tune burst/rate to the app's real traffic shape.
limit_req_zone  $binary_remote_addr zone=app_req_per_ip:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=app_conn_per_ip:10m;

# HTTP :80 — ACME challenge + redirect to HTTPS. No proxy_protocol here.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # SWAG webroot for ACME (used by http/webroot validation).
    location /.well-known/acme-challenge/ {
        root /config/www;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # `proxy_protocol` on 443 ONLY: this listener receives the TLS-passthrough
    # stream from the front nginx, which prepends a PROXY protocol header.
    listen 443 ssl proxy_protocol;
    listen [::]:443 ssl proxy_protocol;

    server_name _; # ${DOMAIN}
    include /config/nginx/ssl.conf;

    # Recover the real client IP from the PROXY protocol header.
    # Trust the header ONLY from the internal Docker network (the front proxy);
    # swag:443 is not published to the host, so only the front can reach it.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header proxy_protocol;

    # --- Anti-flood + anti-slowloris (enforced on the TLS-terminated traffic) ---
    limit_req         zone=app_req_per_ip burst=60 nodelay;
    limit_conn        app_conn_per_ip 40;
    limit_req_status  429;
    limit_conn_status 429;

    client_header_timeout 10s;
    client_body_timeout   15s;
    send_timeout          15s;
    client_max_body_size  150m;          # raise if the app uploads large media
    large_client_header_buffers 4 16k;

    location /socket.io/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_pass http://api:4041;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-NginX-Proxy false;
    }

    location / {
        proxy_pass    http://client:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }

    location /api/ {
        proxy_pass    http://api:4040;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HTTPOnly; Secure";
    }
}
